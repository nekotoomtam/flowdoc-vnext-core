[package]
name = "flowdoc-live-draft-text-engine"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
name = "flowdoc_live_draft_text_engine"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[[bin]]
name = "flowdoc-live-draft-rustybuzz"
path = "src/main.rs"

[[bin]]
name = "flowdoc-live-draft-icu4x"
path = "src/bin/flowdoc-live-draft-icu4x.rs"

[dependencies]
icu_segmenter = "=2.2.0"
rustybuzz = "=0.20.1"
wasm-bindgen = "0.2"
